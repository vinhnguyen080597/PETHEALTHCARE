name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pet-health-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: pet-health-backend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pet-health-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: pet-health-frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn test
      - run: yarn release:verify:public-links
      - run: yarn release:verify:backend

